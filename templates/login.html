{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="form-card">

    <h2>Login</h2>

    <form method="POST">

        <label>Email</label>

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

{% endblock %}
