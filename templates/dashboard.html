<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        .cards{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            flex:1;
            min-width:200px;
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.2);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
        }

        th{
            background:#007BFF;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .table-container{
            overflow-x:auto;
        }

        @media(max-width:768px){

            .cards{
                flex-direction:column;
            }

            .card{
                width:100%;
            }

        }
    </style>

</head>

<body>

<h1>Customer Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total</h3>
<p>20</p>
</div>

<div class="card">
<h3>Open</h3>
<p>8</p>
</div>

<div class="card">
<h3>In Progress</h3>
<p>5</p>
</div>

<div class="card">
<h3>Resolved</h3>
<p>7</p>
</div>

</div>

<div class="table-container">

<table>

<tr>
<th>Description</th>
<th>Category</th>
<th>Priority</th>
<th>Department</th>
<th>Status</th>
<th>Date</th>
</tr>

<tr>
<td>Internet not working</td>
<td>Network</td>
<td>High</td>
<td>IT</td>
<td>Open</td>
<td>20/07/2026</td>
</tr>

<tr>
<td>Water Leakage</td>
<td>Maintenance</td>
<td>Medium</td>
<td>Facilities</td>
<td>Resolved</td>
<td>18/07/2026</td>
</tr>

</table>

</div>

</body>
</html>
