<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}AI Complaint Management System{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">
            <h2>AI Complaint Management System</h2>
        </div>

        <div class="nav-links">
            <!-- Logged Out State (Day 2) -->
            <a href="/login">Login</a>
            <a href="/register">Register</a>

            <!-- Logged In State (Day 3)
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
            -->
        </div>
    </nav>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-container">
                {% for message in messages %}
                    <div class="flash-message">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <!-- Page Content -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
