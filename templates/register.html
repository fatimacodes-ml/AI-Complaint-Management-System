{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="form-card">

    <h2>Create Account</h2>

    <form method="POST">

        <label>Name</label>

        <input
            type="text"
            name="name"
            placeholder="Enter your name"
            required>

        <label>Email</label>

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
