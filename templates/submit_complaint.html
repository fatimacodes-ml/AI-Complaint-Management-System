{% extends "base.html" %}
{% block title %}Submit Complaint{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Submit a Complaint</h1>
    <p class="muted">Describe your issue below. Our AI model will automatically classify the
       category, priority, and department for faster resolution.</p>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('submit_complaint') }}">
        <label>Complaint Description</label>
        <textarea name="complaint_text" rows="6" required
            placeholder="e.g. WiFi is not working in Lab 2, or Salary not received for June"></textarea>

        <button type="submit" class="btn-primary">Submit Complaint</button>
    </form>
</div>
{% endblock %}
