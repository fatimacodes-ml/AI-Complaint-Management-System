<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Complaint</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:10px;
font-weight:bold;
}

textarea{
width:100%;
padding:10px;
margin-bottom:20px;
font-size:16px;
}

button{
background:#007BFF;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

@media(max-width:768px){

.container{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Submit Complaint</h1>

<form>

<label for="description">Complaint Description</label>

<textarea
id="description"
rows="6"
required
placeholder="Write your complaint here..."></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
